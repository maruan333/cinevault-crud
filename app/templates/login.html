{% extends 'base.html' %}
{% block title %}Login | CineVault{% endblock %}
{% block content %}
<section class="auth-wrap">
    <div class="auth-card">
        <h2>Iniciar sesion</h2>
        <p class="muted">Entra para explorar y gestionar el catalogo.</p>

        {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
        {% if success %}<p class="alert ok">{{ success }}</p>{% endif %}

        <form method="post" action="/login" class="stack">
            <label>Usuario</label>
            <input type="text" name="username" required />
            <label>Contrasena</label>
            <input type="password" name="password" required />
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <p class="small">No tienes cuenta? <a href="/register">Crear usuario</a></p>
    </div>
</section>
{% endblock %}

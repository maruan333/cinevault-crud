services:
  db:
    image: mysql:8.0
    container_name: cinevault-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cinevault
      MYSQL_USER: cinevault
      MYSQL_PASSWORD: cinevault123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./app
    image: maruan3/cinevault:latest
    container_name: cinevault-web
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: cinevault
      DB_PASSWORD: cinevault123
      DB_NAME: cinevault
      SECRET_KEY: super-secret-key-change-me
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: cinevault-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 20 --label-enable --cleanup

volumes:
  db_data:
